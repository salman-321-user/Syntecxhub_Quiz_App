<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Quiz App</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #e9eef5 0%, #cfdcee 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 0.75rem;
    }

    .quiz-card {
      max-width: 720px;
      width: 100%;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: clamp(2rem, 8vw, 3.5rem);
      box-shadow: 0 25px 45px -15px rgba(0, 20, 40, 0.3),
                  inset 0 1px 2px rgba(255,255,255,0.7);
      padding: clamp(1.5rem, 5vw, 2.8rem) clamp(1.2rem, 4vw, 2.8rem);
      border: 1px solid rgba(255,255,255,0.55);
      transition: all 0.2s ease;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem 1rem;
      justify-content: space-between;
      align-items: center;
      margin-bottom: clamp(1.2rem, 4vw, 2rem);
      color: #1e2f4d;
    }

    .question-counter {
      font-weight: 500;
      font-size: clamp(0.9rem, 3.5vw, 1.1rem);
      background: rgba(255,255,255,0.7);
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      white-space: nowrap;
    }

    .score-badge {
      font-weight: 600;
      font-size: clamp(0.95rem, 3.8vw, 1.2rem);
      background: #1e2f4d;
      color: white;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      letter-spacing: 0.3px;
      box-shadow: 0 8px 14px -8px #0a1c31;
      white-space: nowrap;
    }

    .question-text {
      font-size: clamp(1.4rem, 6vw, 2.2rem);
      font-weight: 650;
      line-height: 1.3;
      margin-bottom: clamp(1.2rem, 4vh, 2.2rem);
      color: #0b1a2f;
      word-break: break-word;
      hyphens: auto;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: clamp(0.75rem, 2.5vh, 1.2rem);
      margin: clamp(1.2rem, 4vh, 2.2rem) 0 clamp(1rem, 3vh, 1.8rem);
    }

    .option {
      background: white;
      border-radius: 60px;
      padding: clamp(0.9rem, 3vh, 1.4rem) clamp(1.2rem, 4vw, 2rem);
      font-size: clamp(1.1rem, 4vw, 1.4rem);
      font-weight: 500;
      color: #102331;
      box-shadow: 0 6px 14px rgba(0,20,40,0.08);
      transition: all 0.18s;
      border: 2px solid transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      backdrop-filter: blur(2px);
      line-height: 1.4;
      width: 100%;
    }

    .option:hover {
      background: #f2f8ff;
      transform: scale(1.005);
      border-color: #b0c6e8;
    }

    .option.selected {
      background: #deecff;
      border-color: #1e4f8a;
      box-shadow: 0 10px 20px -10px #153b66b3;
      color: #0b2b4a;
      font-weight: 550;
    }

    .option-letter {
      font-weight: 600;
      margin-right: clamp(1rem, 3.5vw, 1.5rem);
      background: #d3e2fd;
      width: clamp(2rem, 7vw, 2.6rem);
      height: clamp(2rem, 7vw, 2.6rem);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      color: #0f3a6b;
      transition: 0.15s;
      font-size: clamp(1rem, 4vw, 1.3rem);
      flex-shrink: 0;
    }

    .option.selected .option-letter {
      background: #1e4f8a;
      color: white;
    }

    .button-group {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: clamp(1.2rem, 4vh, 2rem);
    }

    .btn {
      border: none;
      background: white;
      padding: 0.9rem 1.6rem;
      border-radius: 60px;
      font-size: clamp(1.1rem, 4vw, 1.3rem);
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 8px 18px -8px rgba(0,30,60,0.2);
      border: 1px solid rgba(255,255,255,0.7);
      color: #112b44;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      flex: 1 1 auto;
      min-width: 150px;
    }

    .btn-primary {
      background: #112b44;
      color: white;
      box-shadow: 0 12px 22px -10px #0e2740;
      border: none;
    }

    .btn-primary:hover:not(:disabled) {
      background: #1d3f60;
      transform: scale(1.02);
    }

    .btn:active:not(:disabled) {
      transform: translateY(2px);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
    }

    .restart-btn {
      background: rgba(255,255,255,0.8);
      border: 2px solid #ffffff;
      color: #112b44;
      flex: 0.6 1 130px;
    }

    .restart-btn:hover {
      background: white;
    }

    .final-screen {
      text-align: center;
      padding: clamp(1rem, 3vh, 2rem) 0.2rem;
    }

    .final-score {
      font-size: clamp(3.5rem, 15vw, 6rem);
      font-weight: 700;
      background: linear-gradient(145deg, #123153, #0b253f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0.8rem 0 0.2rem;
      line-height: 1.2;
    }

    .final-message {
      font-size: clamp(1.6rem, 7vw, 2.8rem);
      font-weight: 500;
      color: #1d344b;
      margin-bottom: 1.5rem;
    }

    .fade-transition {
      transition: opacity 0.2s ease-in-out;
    }

    .separator {
      height: 2px;
      background: radial-gradient(circle, #9bb1cf 40%, transparent 90%);
      margin: 0.8rem 0 1rem;
    }

    @media (max-width: 480px) {
      .button-group {
        flex-direction: column-reverse;
      }
      .btn {
        width: 100%;
        min-width: unset;
      }
      .restart-btn {
        order: 2;
      }
      .question-counter, .score-badge {
        white-space: normal;
        text-align: center;
      }
      .header {
        justify-content: center;
      }
    }

    .option, .btn {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
  </style>
</head>
<body>
  <div class="quiz-card" id="quizContainer"></div>

  <script>
    (function() {
      const questions = [
        {
          question: "What is the capital of France?",
          options: ["Berlin", "Madrid", "Paris", "Rome"],
          correct: 2
        },
        {
          question: "Which planet is known as the Red Planet?",
          options: ["Venus", "Mars", "Jupiter", "Saturn"],
          correct: 1
        },
        {
          question: "Who wrote 'Hamlet'?",
          options: ["Charles Dickens", "Jane Austen", "William Shakespeare", "Mark Twain"],
          correct: 2
        },
        {
          question: "What is the largest ocean on Earth?",
          options: ["Atlantic Ocean", "Indian Ocean", "Arctic Ocean", "Pacific Ocean"],
          correct: 3
        },
        {
          question: "How many continents are there?",
          options: ["5", "6", "7", "8"],
          correct: 2
        }
      ];

      let currentIdx = 0;
      let userAnswers = new Array(questions.length).fill(null);
      let quizFinished = false;
      let finalScore = null;

      const container = document.getElementById('quizContainer');

      function computeScore() {
        return questions.reduce((acc, q, i) => acc + (userAnswers[i] === q.correct ? 1 : 0), 0);
      }

      function resetQuiz() {
        currentIdx = 0;
        userAnswers = new Array(questions.length).fill(null);
        quizFinished = false;
        finalScore = null;
      }

      function render() {
        quizFinished ? renderFinal() : renderQuestion();
      }

      function renderQuestion() {
        const q = questions[currentIdx];
        const selected = userAnswers[currentIdx];
        const total = questions.length;
        const answeredCount = userAnswers.filter(v => v !== null).length;

        const letters = ['A', 'B', 'C', 'D'];
        const optionsHtml = q.options.map((opt, idx) => {
          const selClass = (selected === idx) ? 'selected' : '';
          return `
            <div class="option ${selClass}" data-opt-index="${idx}">
              <span class="option-letter">${letters[idx]}</span>
              <span>${opt}</span>
            </div>
          `;
        }).join('');

        const isLast = currentIdx === total - 1;
        const nextBtnText = isLast ? 'Submit quiz' : 'Next →';
        const nextDisabled = selected === null;

        const html = `
          <div class="header">
            <span class="question-counter">${currentIdx+1} / ${total}</span>
            <span class="score-badge">✔ ${answeredCount} answered</span>
          </div>
          <div class="question-text fade-transition">${q.question}</div>
          <div class="options-grid" id="optionsContainer">
            ${optionsHtml}
          </div>
          <div class="separator"></div>
          <div class="button-group">
            <button class="btn restart-btn" id="restartBtn">↻ Restart</button>
            <button class="btn btn-primary" id="nextOrSubmitBtn" ${nextDisabled ? 'disabled' : ''}>${nextBtnText}</button>
          </div>
        `;

        container.innerHTML = html;

        document.querySelectorAll('.option').forEach(optDiv => {
          optDiv.addEventListener('click', (e) => {
            if (quizFinished) return;
            const idx = parseInt(optDiv.dataset.optIndex, 10);
            userAnswers[currentIdx] = idx;
            renderQuestion();
          });
        });

        document.getElementById('nextOrSubmitBtn').addEventListener('click', () => {
          if (isLast) {
            quizFinished = true;
            finalScore = computeScore();
            render();
          } else {
            currentIdx++;
            render();
          }
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
          resetQuiz();
          render();
        });
      }

      function renderFinal() {
        const total = questions.length;
        const score = finalScore !== null ? finalScore : computeScore();

        let congrats = '';
        if (score === total) congrats = 'Perfect! 🌟';
        else if (score >= total - 2) congrats = 'Great job!';
        else if (score >= total / 2) congrats = 'Nice try!';
        else congrats = 'Keep learning!';

        const html = `
          <div class="final-screen fade-transition">
            <div class="final-message">${congrats}</div>
            <div class="final-score">${score} / ${total}</div>
            <div style="margin: 1.8rem 0 1rem; font-size: clamp(1.1rem, 4vw, 1.5rem); color:#2d4260;">✨ challenge completed ✨</div>
            <div class="separator" style="margin: 1.5rem 0;"></div>
            <button class="btn btn-primary" id="restartFromFinalBtn" style="min-width: 200px;">↻ play again</button>
          </div>
        `;

        container.innerHTML = html;

        document.getElementById('restartFromFinalBtn').addEventListener('click', () => {
          resetQuiz();
          render();
        });
      }

      render();
    })();
  </script>
</body>

</html>
